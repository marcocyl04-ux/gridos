<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GridOS DevTools - Node Graph & API Explorer</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        :root {
            --bg: #0d1117;
            --bg-secondary: #161b22;
            --bg-tertiary: #21262d;
            --border: #30363d;
            --text: #c9d1d9;
            --text-secondary: #8b949e;
            --accent: #58a6ff;
            --accent-hover: #79c0ff;
            --success: #238636;
            --warning: #f0883e;
            --danger: #da3633;
            --node-write: #238636;
            --node-read: #58a6ff;
            --node-compute: #f0883e;
            --node-control: #a371f7;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            height: 100vh;
            overflow: hidden;
        }
        
        .dev-shell {
            display: grid;
            grid-template-columns: 260px 1fr;
            height: 100vh;
        }
        
        /* Sidebar Navigation */
        .dev-sidebar {
            background: var(--bg-secondary);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
        }
        
        .dev-header {
            padding: 20px;
            border-bottom: 1px solid var(--border);
        }
        
        .dev-header h1 {
            font-size: 16px;
            font-weight: 600;
            color: var(--accent);
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .dev-header h1::before {
            content: "◆";
            font-size: 14px;
        }
        
        .dev-header p {
            font-size: 12px;
            color: var(--text-secondary);
            margin-top: 4px;
        }
        
        .dev-nav {
            flex: 1;
            padding: 12px;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        
        .nav-section {
            margin-bottom: 16px;
        }
        
        .nav-section-title {
            font-size: 11px;
            text-transform: uppercase;
            color: var(--text-secondary);
            padding: 8px 12px;
            font-weight: 600;
            letter-spacing: 0.5px;
        }
        
        .nav-btn {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 12px;
            border: none;
            background: transparent;
            color: var(--text);
            font-size: 13px;
            cursor: pointer;
            border-radius: 6px;
            transition: all 0.15s;
            text-align: left;
            width: 100%;
        }
        
        .nav-btn:hover {
            background: var(--bg-tertiary);
        }
        
        .nav-btn.active {
            background: var(--accent);
            color: white;
        }
        
        .nav-btn .icon {
            width: 20px;
            text-align: center;
            font-size: 14px;
        }
        
        /* Main Content Area */
        .dev-content {
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        
        .dev-toolbar {
            padding: 12px 20px;
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        
        .toolbar-title {
            font-size: 14px;
            font-weight: 500;
        }
        
        .toolbar-actions {
            display: flex;
            gap: 8px;
        }
        
        .btn {
            padding: 6px 14px;
            border: 1px solid var(--border);
            background: var(--bg-tertiary);
            color: var(--text);
            font-size: 12px;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.15s;
        }
        
        .btn:hover {
            border-color: var(--accent);
        }
        
        .btn-primary {
            background: var(--accent);
            border-color: var(--accent);
            color: white;
        }
        
        .btn-primary:hover {
            background: var(--accent-hover);
        }
        
        .btn-success {
            background: var(--success);
            border-color: var(--success);
            color: white;
        }
        
        /* Panel Content */
        .panel-container {
            flex: 1;
            overflow: auto;
            padding: 20px;
        }
        
        .panel {
            display: none;
        }
        
        .panel.active {
            display: block;
        }
        
        /* Node Graph Visualizer */
        .graph-workspace {
            display: grid;
            grid-template-columns: 1fr 320px;
            gap: 20px;
            height: calc(100vh - 140px);
        }
        
        .graph-canvas {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 8px;
            position: relative;
            overflow: auto;
        }
        
        .graph-svg {
            width: 100%;
            height: 100%;
            min-width: 600px;
            min-height: 400px;
        }
        
        .node {
            cursor: grab;
        }
        
        .node:hover {
            filter: brightness(1.1);
        }
        
        .node.dragging {
            cursor: grabbing;
        }
        
        .node-rect {
            rx: 6;
            stroke-width: 2;
        }
        
        .node-text {
            fill: white;
            font-size: 12px;
            font-weight: 500;
            pointer-events: none;
        }
        
        .node-type-text {
            fill: rgba(255,255,255,0.7);
            font-size: 10px;
            pointer-events: none;
        }
        
        .connection {
            fill: none;
            stroke: var(--border);
            stroke-width: 2;
        }
        
        .connection:hover {
            stroke: var(--accent);
        }
        
        .graph-sidebar {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        
        .sidebar-section {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 16px;
        }
        
        .sidebar-section h3 {
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 12px;
            color: var(--text);
        }
        
        .node-palette {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
        }
        
        .palette-item {
            padding: 12px 8px;
            background: var(--bg-tertiary);
            border: 1px solid var(--border);
            border-radius: 6px;
            text-align: center;
            cursor: grab;
            font-size: 11px;
            transition: all 0.15s;
        }
        
        .palette-item:hover {
            border-color: var(--accent);
            transform: translateY(-1px);
        }
        
        .palette-item.write { border-left: 3px solid var(--node-write); }
        .palette-item.read { border-left: 3px solid var(--node-read); }
        .palette-item.compute { border-left: 3px solid var(--node-compute); }
        .palette-item.control { border-left: 3px solid var(--node-control); }
        
        /* API Explorer */
        .api-workspace {
            display: grid;
            grid-template-columns: 280px 1fr;
            gap: 20px;
            height: calc(100vh - 140px);
        }
        
        .api-list {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 8px;
            overflow: auto;
        }
        
        .api-search {
            padding: 12px;
            border-bottom: 1px solid var(--border);
        }
        
        .api-search input {
            width: 100%;
            padding: 8px 12px;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 6px;
            color: var(--text);
            font-size: 13px;
        }
        
        .api-search input:focus {
            outline: none;
            border-color: var(--accent);
        }
        
        .api-item {
            padding: 12px;
            border-bottom: 1px solid var(--border);
            cursor: pointer;
            transition: all 0.15s;
        }
        
        .api-item:hover {
            background: var(--bg-tertiary);
        }
        
        .api-item.active {
            background: var(--accent);
            color: white;
        }
        
        .api-item .method {
            display: inline-block;
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 10px;
            font-weight: 600;
            margin-right: 8px;
        }
        
        .api-item .method.get { background: var(--node-read); }
        .api-item .method.post { background: var(--success); }
        .api-item .method.put { background: var(--warning); }
        .api-item .method.delete { background: var(--danger); }
        
        .api-item .path {
            font-size: 12px;
            font-family: 'SF Mono', Monaco, monospace;
        }
        
        .api-detail {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        
        .api-detail-section {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 16px;
        }
        
        .api-detail-section h4 {
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            color: var(--text-secondary);
            margin-bottom: 12px;
            letter-spacing: 0.5px;
        }
        
        .code-block {
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 12px;
            overflow-x: auto;
        }
        
        .code-block pre {
            font-family: 'SF Mono', Monaco, monospace;
            font-size: 12px;
            line-height: 1.5;
            margin: 0;
        }
        
        .code-block .key { color: #7ee787; }
        .code-block .string { color: #a5d6ff; }
        .code-block .number { color: #79c0ff; }
        .code-block .boolean { color: #ff7b72; }
        
        /* Intent Playground */
        .playground-workspace {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            height: calc(100vh - 140px);
        }
        
        .playground-panel {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 8px;
            display: flex;
            flex-direction: column;
        }
        
        .playground-panel h3 {
            padding: 16px;
            border-bottom: 1px solid var(--border);
            font-size: 13px;
            font-weight: 600;
        }
        
        .playground-input {
            flex: 1;
            padding: 16px;
            background: transparent;
            border: none;
            color: var(--text);
            font-family: 'SF Mono', Monaco, monospace;
            font-size: 13px;
            line-height: 1.6;
            resize: none;
            outline: none;
        }
        
        .playground-output {
            flex: 1;
            padding: 16px;
            overflow: auto;
        }
        
        .playground-toolbar {
            padding: 12px 16px;
            border-top: 1px solid var(--border);
            display: flex;
            gap: 8px;
        }
        
        /* Template Builder */
        .builder-workspace {
            display: grid;
            grid-template-columns: 300px 1fr;
            gap: 20px;
            height: calc(100vh - 140px);
        }
        
        .builder-sidebar {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 16px;
            overflow: auto;
        }
        
        .builder-main {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        
        .builder-editor {
            flex: 1;
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 8px;
            display: flex;
            flex-direction: column;
        }
        
        .editor-tabs {
            display: flex;
            border-bottom: 1px solid var(--border);
        }
        
        .editor-tab {
            padding: 12px 20px;
            border: none;
            background: transparent;
            color: var(--text-secondary);
            font-size: 12px;
            cursor: pointer;
            border-bottom: 2px solid transparent;
        }
        
        .editor-tab.active {
            color: var(--text);
            border-bottom-color: var(--accent);
        }
        
        .editor-content {
            flex: 1;
            padding: 16px;
        }
        
        .yaml-editor {
            width: 100%;
            height: 100%;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 16px;
            color: var(--text);
            font-family: 'SF Mono', Monaco, monospace;
            font-size: 13px;
            line-height: 1.6;
            resize: none;
            outline: none;
        }
        
        /* System Health */
        .health-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 16px;
        }
        
        .health-card {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 20px;
        }
        
        .health-card h3 {
            font-size: 13px;
            font-weight: 600;
            color: var(--text-secondary);
            margin-bottom
